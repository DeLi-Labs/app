query MainStats {
  mainStats(id: "global") {
    id
    uniquePatents
    totalEmittedLicensesValueUSD
    totalTradingVolumeUSD
    uniquePatentOwners
    totalInteractions
    totalSales
    campaignAmount
    retailPercent
    growthPercent
  }
}

query Categories($limit: Int, $offset: Int) {
  categorys(limit: $limit, offset: $offset) {
    items {
      id
      totalEmittedLicensesValueUSD
      totalTradingVolumeUSD
      topGrowth24hCampaignLicenseAddress
      topGrowth24hCampaign {
        licenseAddress
        licenseSymbol
        numeraireAddress
        numeraireSymbol
        poolId
        licenseType
        denominationUnit
        denominationAmount
        licenseDuration
        territoryRestriction
        usageRightsDefinition
        transferrabilityFlag
        currentPrice
        totalSupply
        totalEmittedLicensesValueUSD
        totalTradingVolumeUSD
      }
      totalInteractions
      totalSales
      retailPercent
      growthPercent
      ips {
        totalCount
      }
    }
  }
}

query LatestIps($limit: Int!) {
  ips(orderBy: "creationTimestamp", orderDirection: "desc", limit: $limit) {
    items {
      tokenId
      categoryId
      image
      name
      description
      growthPercent
      totalEmittedLicensesValueUSD
      campaigns {
        items {
          licenseAddress
          licenseSymbol
          numeraireSymbol
          poolId
          denominationUnit
          denominationAmount
          currentPrice
          totalSupply
          totalEmittedLicensesValueUSD
        }
      }
    }
  }
}

query AllCampaigns24hVolume($limit: Int) {
  campaigns(limit: $limit) {
    items {
      licenseAddress
      campaignDayDatas(orderBy: "periodStartTimestamp", orderDirection: "desc", limit: 1) {
        items {
          totalTradingVolumeUSD
        }
      }
    }
  }
}
