

query Ips($orderBy: String, $orderDirection: String, $limit: Int, $offset: Int, $where: ipFilter) {
  ips(orderBy: $orderBy, orderDirection: $orderDirection, limit: $limit, offset: $offset, where: $where) {
    items {
      tokenId
      name
      description
      image
      creationTimestamp
      categoryId
      totalEmittedLicensesValueUSD
      campaigns {
        items {
          licenseAddress
          numeraireAddress
          poolId
          licenseType
          denominationUnit
          denominationAmount
          licenseDuration
          territoryRestriction
          usageRightsDefinition
          transferrabilityFlag
        }
      }
    }
  }
}

query DiscoverIps($orderBy: String, $orderDirection: String, $limit: Int, $offset: Int, $where: ipFilter) {
  ips(orderBy: $orderBy, orderDirection: $orderDirection, limit: $limit, offset: $offset, where: $where) {
    items {
      tokenId
      accountAddress
      name
      patentNumber
      inventorNames
      jurisdiction
      registrationAuthority
      patentClassification
      filingDate
      grantDate
      description
      image
      creationTimestamp
      status
      statusUpdateTimestamp
      statusUpdateExplanation
      reasonCode
      caseReference
      industry
      categoryId
      retailPercent
      growthPercent
      totalInteractions
      totalSales
      totalEmittedLicensesValueUSD
      totalTradingVolumeUSD
      topGrowth24hCampaignLicenseAddress
      topGrowth24hCampaign {
        licenseAddress
        licenseSymbol
        numeraireAddress
        numeraireSymbol
        poolId
        licenseType
        denominationUnit
        denominationAmount
        licenseDuration
        territoryRestriction
        usageRightsDefinition
        transferrabilityFlag
        currentPrice
        totalSupply
        totalEmittedLicensesValueUSD
        totalTradingVolumeUSD
        campaignDayDatas(orderBy: "periodStartTimestamp", orderDirection: "desc", limit: 1) {
          items {
            id
            periodStartTimestamp
            licenseAddress
            totalEmittedLicensesValueUSD
            totalTradingVolumeUSD
            sqrtPriceX96PeriodStart
            highPrice
            lowPrice
            avgPrice
            growthPercent
            retailPercent
            totalInteractions
            totalSales
          }
        }
      }
    }
    totalCount
  }
}

query IpsDetails($orderBy: String, $orderDirection: String, $limit: Int, $offset: Int, $where: ipFilter) {
  ips(orderBy: $orderBy, orderDirection: $orderDirection, limit: $limit, offset: $offset, where: $where) {
