query CampaignPeriodDatas(
  $whereHour: campaignHourDataFilter,
  $whereDay: campaignDayDataFilter,
  $whereWeek: campaignWeekDataFilter,
  $whereMonth: campaignMonthDataFilter,
  $orderBy: String,
  $orderDirection: String,
  $limit: Int,
  $fetchHour: Boolean!,
  $fetchDay: Boolean!,
  $fetchWeek: Boolean!,
  $fetchMonth: Boolean!
) {
  campaignHourDatas(where: $whereHour, orderBy: $orderBy, orderDirection: $orderDirection, limit: $limit) @include(if: $fetchHour) {
    items {
      id
      periodStartTimestamp
      licenseAddress
      sqrtPriceX96PeriodStart
      highPrice
      lowPrice
      avgPrice
      growthPercent
      retailPercent
      totalInteractions
      totalSales
    }
  }
  campaignDayDatas(where: $whereDay, orderBy: $orderBy, orderDirection: $orderDirection, limit: $limit) @include(if: $fetchDay) {
    items {
      id
      periodStartTimestamp
      licenseAddress
      sqrtPriceX96PeriodStart
      highPrice
      lowPrice
      avgPrice
      growthPercent
      retailPercent
      totalInteractions
      totalSales
    }
  }
  campaignWeekDatas(where: $whereWeek, orderBy: $orderBy, orderDirection: $orderDirection, limit: $limit) @include(if: $fetchWeek) {
    items {
      id
      periodStartTimestamp
      licenseAddress
      sqrtPriceX96PeriodStart
      highPrice
      lowPrice
      avgPrice
      growthPercent
      retailPercent
      totalInteractions
      totalSales
    }
  }
  campaignMonthDatas(where: $whereMonth, orderBy: $orderBy, orderDirection: $orderDirection, limit: $limit) @include(if: $fetchMonth) {
    items {
      id
      periodStartTimestamp
      licenseAddress
      sqrtPriceX96PeriodStart
      highPrice
      lowPrice
      avgPrice
      growthPercent
      retailPercent
      totalInteractions
      totalSales
    }
  }
}

query CampaignPeriodAvgPriceDatas(
  $whereHour: campaignHourDataFilter,
  $whereDay: campaignDayDataFilter,
  $whereWeek: campaignWeekDataFilter,
  $whereMonth: campaignMonthDataFilter,
  $orderBy: String,
  $orderDirection: String,
  $limit: Int,
  $fetchHour: Boolean!,
  $fetchDay: Boolean!,
  $fetchWeek: Boolean!,
  $fetchMonth: Boolean!
) {
  campaignHourDatas(where: $whereHour, orderBy: $orderBy, orderDirection: $orderDirection, limit: $limit) @include(if: $fetchHour) {
    items {
      timestamp: periodStartTimestamp
      avgPrice
    }
  }
  campaignDayDatas(where: $whereDay, orderBy: $orderBy, orderDirection: $orderDirection, limit: $limit) @include(if: $fetchDay) {
    items {
      timestamp: periodStartTimestamp
      avgPrice
    }
  }
  campaignWeekDatas(where: $whereWeek, orderBy: $orderBy, orderDirection: $orderDirection, limit: $limit) @include(if: $fetchWeek) {
    items {
      timestamp: periodStartTimestamp
      avgPrice
    }
  }
  campaignMonthDatas(where: $whereMonth, orderBy: $orderBy, orderDirection: $orderDirection, limit: $limit) @include(if: $fetchMonth) {
    items {
      timestamp: periodStartTimestamp
      avgPrice
    }
  }
}

query PatentDetail($tokenId: BigInt!) {
  ip(tokenId: $tokenId) {
    name
    image
    description
    industry
    categoryId
    accountAddress
    inventorNames
    status
    statusUpdateTimestamp
    statusUpdateExplanation
    patentNumber
    jurisdiction
    registrationAuthority
    filingDate
    grantDate
    patentClassification
    creationTimestamp
    campaigns {
      items {
        licenseAddress
        licenseSymbol
        numeraireAddress
        numeraireSymbol
        licenseType
        usageRightsDefinition
        transferrabilityFlag
        licenseDuration
        denominationUnit
        denominationAmount
        currentPrice
        totalSupply
        totalEmittedLicensesValueUSD
        totalTradingVolumeUSD
        campaignDayDatas(orderBy: "periodStartTimestamp", orderDirection: "desc", limit: 1) {
          items {
            growthPercent
          }
        }
        campaignHourDatas(orderBy: "periodStartTimestamp", orderDirection: "desc", limit: 12) {
          items {
            periodStartTimestamp
            avgPrice
            retailPercent
          }
        }
      }
    }
  }
}

query TreasuryLicenseBalances($where: treasuryLicenseBalanceFilter, $limit: Int) {
  treasuryLicenseBalances(where: $where, limit: $limit) {
    items {
      licenseSymbol
      licenseAddress
      balance
      numeraireSymbol
      totalValueNumeraire
      periodTotalValueNumeraireGrowth1h
      periodTotalValueNumeraireGrowth24h
      periodTotalValueNumeraireGrowth1w
      periodTotalValueNumeraireGrowth1m
    }
  }
}

